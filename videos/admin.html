<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Upload</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0f172a;
      color:#fff;
      padding:20px;
    }
    .wrap{
      max-width:700px;
      margin:0 auto;
    }
    .card{
      background:#1e293b;
      border-radius:16px;
      padding:20px;
      margin-top:20px;
    }
    h1{
      text-align:center;
      margin:0 0 10px;
    }
    p{
      text-align:center;
      color:#cbd5e1;
    }
    input,button{
      width:100%;
      padding:12px;
      margin-top:12px;
      border:none;
      border-radius:10px;
      font-size:16px;
    }
    input{
      background:#fff;
      color:#111;
    }
    button{
      background:#2563eb;
      color:#fff;
      font-weight:bold;
      cursor:pointer;
    }
    #panel{display:none}
    #msg{
      margin-top:12px;
      color:#facc15;
      white-space:pre-line;
    }
    .ok{color:#4ade80}
    .err{color:#f87171}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card" id="loginCard">
      <h1>Admin</h1>
      <p>ใส่รหัส 5555 เพื่อเข้าอัปโหลดคลิป</p>
      <input type="password" id="pass" placeholder="Password">
      <button id="loginBtn">Login</button>
      <div id="msg"></div>
    </div>

    <div class="card" id="panel">
      <h1>Upload Video</h1>
      <input type="text" id="title" placeholder="ชื่อคลิป">
      <input type="file" id="file" accept="video/*">
      <button id="uploadBtn">Upload</button>
      <div id="uploadMsg"></div>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    const SUPABASE_URL = "https://cveuydxnvznvsoemedqc.supabase.co";
    const SUPABASE_KEY = "sb_publishable_cBCvq1SS8yGwpw19mD6M8Q_KB_lrt9R";

    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    const loginBtn = document.getElementById("loginBtn");
    const passInput = document.getElementById("pass");
    const msg = document.getElementById("msg");
    const panel = document.getElementById("panel");

    const uploadBtn = document.getElementById("uploadBtn");
    const titleInput = document.getElementById("title");
    const fileInput = document.getElementById("file");
    const uploadMsg = document.getElementById("uploadMsg");

    function showMessage(text, type="") {
      msg.textContent = text;
      msg.className = type;
    }

    function showUploadMessage(text, type="") {
      uploadMsg.textContent = text;
      uploadMsg.className = type;
    }

    loginBtn.addEventListener("click", () => {
      const password = passInput.value.trim();

      if (password === "5555") {
        panel.style.display = "block";
        showMessage("เข้าสู่ระบบสำเร็จ", "ok");
      } else {
        panel.style.display = "none";
        showMessage("รหัสไม่ถูกต้อง", "err");
      }
    });

    uploadBtn.addEventListener("click", async () => {
      const title = titleInput.value.trim();
      const file = fileInput.files[0];

      if (!title) {
        showUploadMessage("กรุณาใส่ชื่อคลิป", "err");
        return;
      }

      if (!file) {
        showUploadMessage("กรุณาเลือกไฟล์วิดีโอ", "err");
        return;
      }

      try {
        showUploadMessage("กำลังอัปโหลด...", "");

        const fileName = `${Date.now()}-${file.name}`;
        const filePath = fileName;

        const { error: uploadError } = await supabase
          .storage
          .from("videos")
          .upload(filePath, file, { upsert: false });

        if (uploadError) {
          showUploadMessage("อัปโหลดไฟล์ไม่สำเร็จ: " + uploadError.message, "err");
          return;
        }

        const { data: publicUrlData } = supabase
          .storage
          .from("videos")
          .getPublicUrl(filePath);

        const fileUrl = publicUrlData.publicUrl;

        const { error: insertError } = await supabase
          .from("videos")
          .insert([{ title, file_url: fileUrl }]);

        if (insertError) {
          showUploadMessage("บันทึกข้อมูลไม่สำเร็จ: " + insertError.message, "err");
          return;
        }

        showUploadMessage("อัปโหลดสำเร็จ", "ok");
        titleInput.value = "";
        fileInput.value = "";
      } catch (e) {
        showUploadMessage("เกิดข้อผิดพลาด: " + e.message, "err");
      }
    });
  </script>
</body>
</html>

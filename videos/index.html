<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Video Web</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
}

video{
width:100%;
}
</style>

</head>

<body>

<h1>Video Library</h1>

<div class="grid" id="videos"></div>

<script>

const supabase = window.supabase.createClient(
"https://cveuydxnvznvsoemedqc.supabase.co",
"sb_publishable_cBCvq1SS8yGwpw19mD6M8Q_KB_lrt9R"
)

async function loadVideos(){

let {data} = await supabase
.from("videos")
.select("*")
.order("id",{ascending:false})

let html=""

data.forEach(v=>{

html+=`
<div class="card">

<video controls>
<source src="${v.file_url}">
</video>

<h3>${v.title}</h3>

<a href="${v.file_url}" download>Download</a>

</div>
`
})

document.getElementById("videos").innerHTML=html

}

loadVideos()

</script>

</body>
</html>
